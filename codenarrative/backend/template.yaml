          Properties:
            RestApiId: !Ref CodeNarrativeApi
            Path: /api/pr-review
            Method: post
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ReposTable
        - Statement:
            - Effect: Allow
              Action:
                - "bedrock:InvokeModel"
                - "bedrock:InvokeModelWithResponseStream"
              Resource: "*"

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${CodeNarrativeApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"

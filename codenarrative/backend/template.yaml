AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: CodeNarrative serverless backend

Globals:
  Api:
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 512
    Handler: index.lambda_handler
    Environment:
      Variables:
        REPOS_TABLE_NAME: !Ref ReposTable
        USERS_TABLE_NAME: !Ref UsersTable
        TESTS_TABLE_NAME: !Ref TestsTable
        BEDROCK_REGION: us-east-1
        # DeepSeek-R1 on Amazon Bedrock (GA March 2025, us-east-1 only)
        BEDROCK_MODEL_ID: us.deepseek.r1-v1:0
        BEDROCK_MODEL_ID_HAIKU: us.deepseek.r1-v1:0
        GITHUB_TOKEN: ""

Resources:
  ReposTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: repo_id
          AttributeType: S
      KeySchema:
        - AttributeName: repo_id
          KeyType: HASH

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: repo_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: repo_id
          KeyType: RANGE

  TestsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: repo_id
          AttributeType: S
        - AttributeName: test_id
          AttributeType: S
      KeySchema:
        - AttributeName: repo_id
          KeyType: HASH
        - AttributeName: test_id
          KeyType: RANGE

  VideoJobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH

  VideoOutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, HEAD]
            AllowedOrigins: ["*"]
            ExposedHeaders: [Content-Length, Content-Type]

  VideoOutputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VideoOutputBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowBedrockAsyncOutput
            Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub
              - "arn:aws:s3:::${Bucket}/videos/*"
              - Bucket: !Ref VideoOutputBucket
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  CodeNarrativeApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Requested-With'"
        AllowOrigin: "'*'"
      GatewayResponses:
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Requested-With'"
              Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Requested-With'"
              Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"

  RepoAnalysisFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handlers/repo_analysis_handler.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          USE_WEB_GROUNDING_REPO_ANALYSIS: "true"
          DEPLOY_VERSION: "raw-http-v1"
          REPO_ANALYSIS_WORKER_FUNCTION_NAME: !Ref RepoAnalysisWorkerFunction
      Events:
        Analyze:
          Type: Api
          Properties:
            RestApiId: !Ref CodeNarrativeApi
            Path: /api/analyze
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReposTable
        - Statement:
            - Effect: Allow
              Action:
                - "bedrock:InvokeModel"
                - "bedrock:InvokeModelWithResponseStream"
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action: "lambda:InvokeFunction"
              Resource: !GetAtt RepoAnalysisWorkerFunction.Arn

  RepoAnalysisWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handlers/repo_analysis_handler.worker_lambda_handler
      Timeout: 120
      Environment:
        Variables:
          USE_WEB_GROUNDING_REPO_ANALYSIS: "true"
          USE_MULTIMODAL_REPO_ANALYSIS: "true"
          BEDROCK_REGION: us-east-1
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReposTable
        - Statement:
            - Effect: Allow
              Action: "bedrock:InvokeModel"
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action: "bedrock:InvokeTool"
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action:
                - "aws-marketplace:ViewSubscriptions"
                - "aws-marketplace:Subscribe"
                - "aws-marketplace:Unsubscribe"
              Resource: "*"

  GetRepoFunction:
